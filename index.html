<script type="module">
import { HandLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm';

<style>

    color: #f4f0ff;
    font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    height: 100%;

  /* ===================== 설정 화면 ===================== */

<script type="module">
function dbg(msg) {
  console.log(msg);
}

// 모듈이 비동기로 window에 등록되므로 대기
async function waitForVisionLibs(timeoutMs = 8000) {
  const start = Date.now();
  while (!window.HandLandmarker || !window.FilesetResolver) {
    if (Date.now() - start > timeoutMs) {
      throw new Error('MediaPipe 라이브러리 로딩 타임아웃');
    }
    await new Promise(r => setTimeout(r, 100));
  }
  return { HandLandmarker: window.HandLandmarker, FilesetResolver: window.FilesetResolver };
}

dbg('스크립트 시작.');

// ── 제스처 정의 ──
const GESTURES = [
  { id: 'heart',    emoji: '🫰', name: '손가락 하트', color: '#ff5d8f', placeholder: '사랑해 ❤️' },
  { id: 'victory',  emoji: '✌️', name: '브이 사인',   color: '#7df2ff', placeholder: '생일 축하해 🎂' },
  { id: 'thumbsup', emoji: '👍', name: '엄지척',       color: '#ffd66b', placeholder: '최고야!' },
  { id: 'ok',       emoji: '👌', name: '오케이',       color: '#b18cff', placeholder: '잘하고 있어' },
  { id: 'highfive', emoji: '✋', name: '하이파이브',   color: '#6bffb0', placeholder: '안녕!' },
];

// ── 설정 화면 렌더 ──
const gestureList = document.getElementById('gestureList');
const STORAGE_KEY = 'gestureMessages_v1';
const PRESETS_KEY = 'gesturePresets_v1';
let messages = {}; // id -> text (새로 작성인 것)
let presets = {};  // presetName -> {id: text, ...}

function loadSavedMessages() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) messages = JSON.parse(saved);
  } catch(e) { /* ignore */ }
}
function saveMessages() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
  } catch(e) { /* ignore */ }
}
function loadPresets() {
  try {
    const saved = localStorage.getItem(PRESETS_KEY);
    if (saved) presets = JSON.parse(saved);
    console.log('프리셋 로드:', presets);
  } catch(e) { console.error('프리셋 로드 에러', e); }
}
function savePresets() {
  try {
    localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
    console.log('프리셋 저장됨:', presets);
  } catch(e) { console.error('프리셋 저장 에러', e); }
}
loadSavedMessages();
loadPresets();

function renderPresetOptions() {
  const sel = document.getElementById('presetSelect');
  sel.innerHTML = '<option value="">새로 작성</option>';
  Object.keys(presets).forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
}
renderPresetOptions();

function renderGestureInputs() {
  gestureList.innerHTML = '';
  GESTURES.forEach(g => {
    const row = document.createElement('div');
    row.className = 'gesture-row';
    const savedVal = messages[g.id] || '';
    row.innerHTML = `
      <div class="gesture-emoji">${g.emoji}</div>
      <div class="gesture-meta">
        <div class="gesture-label">${g.name}</div>
        <input class="gesture-input" type="text" maxlength="24" placeholder="${g.placeholder}" data-id="${g.id}" value="${savedVal.replace(/"/g,'&quot;')}">
      </div>
    `;
    gestureList.appendChild(row);
  });
}
renderGestureInputs();

gestureList.addEventListener('input', (e) => {
  if (e.target.classList.contains('gesture-input')) {
    messages[e.target.dataset.id] = e.target.value.trim();
    saveMessages();
  }
});

// 프리셋 선택 → 불러오기
document.getElementById('presetSelect').addEventListener('change', (e) => {
  const name = e.target.value;
  if (!name) {
    // 새로 작성 → 모두 빈칸으로
    messages = {};
    saveMessages();
    renderGestureInputs();
    return;
  }
  if (presets[name]) {
    messages = { ...presets[name] };
    saveMessages();
    renderGestureInputs();
  }
});

// 프리셋 저장 - 인라인 모달
document.getElementById('presetSaveBtn').addEventListener('click', () => {
  const hasAny = GESTURES.some(g => messages[g.id] && messages[g.id].length > 0);
  if (!hasAny) {
    alert('저장할 문구가 없어요. 먼저 메시지를 입력해주세요!');
    return;
  }
  const modal = document.getElementById('presetSaveModal');
  const input = document.getElementById('presetNameInput');
  const defaultName = document.getElementById('presetSelect').value || '';
  input.value = defaultName;
  modal.classList.add('visible');
  setTimeout(() => input.focus(), 50);
});

document.getElementById('presetCancelBtn').addEventListener('click', () => {
  document.getElementById('presetSaveModal').classList.remove('visible');
});

function confirmSavePreset() {
  const input = document.getElementById('presetNameInput');
  const name = input.value.trim();
  if (!name) {
    input.focus();
    return;
  }
  presets[name] = { ...messages };
  savePresets();
  renderPresetOptions();
  document.getElementById('presetSelect').value = name;
  document.getElementById('presetSaveModal').classList.remove('visible');
}

document.getElementById('presetConfirmBtn').addEventListener('click', confirmSavePreset);
document.getElementById('presetNameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    confirmSavePreset();
  }
});

// 프리셋 삭제
document.getElementById('presetDeleteBtn').addEventListener('click', () => {
  const sel = document.getElementById('presetSelect');
  const name = sel.value;
  if (!name) {
    alert('삭제할 저장된 세트를 먼저 선택해주세요.');
    return;
  }
  if (confirm(`"${name}" 세트를 삭제할까요?`)) {
    delete presets[name];
    savePresets();
    renderPresetOptions();
  }
});

// ── 카메라 시작 ──
let stream = null;
let handLandmarker = null;
let lastVideoTime = -1;
let armedGesture = null;     // 현재 감지된 제스처
let armedSince = 0;          // 감지 시작 시각
let firedGesture = null;     // 이미 메시지 보여준 제스처(쿨다운)
let fireLockUntil = 0;
const HOLD_MS = 550;         // 제스처 유지해야 하는 시간
const COOLDOWN_MS = 3000;

const video = document.getElementById('video');
const fxCanvas = document.getElementById('fxCanvas');
const fxCtx = fxCanvas.getContext('2d');

document.getElementById('startBtn').addEventListener('click', async () => {
  // 최소 1개 문구 체크
  const hasAny = GESTURES.some(g => messages[g.id] && messages[g.id].length > 0);
  if (!hasAny) {
    const hint = document.querySelector('.start-hint');
    hint.style.color = '#ff5d8f';
    hint.style.fontWeight = '800';
    hint.textContent = '⚠️ 최소 1개 이상 문구를 입력해주세요!';
    hint.style.animation = 'none';
    requestAnimationFrame(() => { hint.style.animation = 'shakeHint 0.4s'; });

    // 첫 번째 입력칸으로 스크롤 + 포커스 + 강조
    const firstInput = document.querySelector('.gesture-input');
    const firstRow = document.querySelector('.gesture-row');
    if (firstRow) {
      firstRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
      firstRow.style.borderColor = '#ff5d8f';
      setTimeout(() => { firstInput && firstInput.focus(); }, 350);
      setTimeout(() => { firstRow.style.borderColor = ''; }, 2000);
    }
    return;
  }

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },
      audio: false
    });
    video.srcObject = stream;
    await video.play();

    fxCanvas.width = window.innerWidth;
    fxCanvas.height = window.innerHeight;

    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('cameraScreen').style.display = 'block';

    renderTray();
    await initHandLandmarker();
    requestAnimationFrame(detectLoop);
  } catch (e) {
    alert('카메라 권한을 허용해주세요!');
  }
});

function renderTray() {
  const tray = document.getElementById('gestureTray');
  tray.innerHTML = '';
  GESTURES.forEach(g => {
    if (!messages[g.id]) return; // 문구 없으면 트레이에 안 보임
    const chip = document.createElement('div');
    chip.className = 'tray-chip';
    chip.id = 'chip-' + g.id;
    chip.innerHTML = `<div class="tray-emoji">${g.emoji}</div><div class="tray-text">${g.name}</div>`;
    tray.appendChild(chip);
  });
}

async function initHandLandmarker() {
  try {
    dbg('MediaPipe 라이브러리 대기 중...');
    const { HandLandmarker, FilesetResolver } = await waitForVisionLibs();
    dbg('라이브러리 로드 완료. FilesetResolver 초기화...');
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    dbg('FilesetResolver 완료. HandLandmarker 생성 중...');
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate: 'CPU'
      },
      runningMode: 'VIDEO',
      numHands: 1
    });
    dbg('HandLandmarker 준비 완료!');
  } catch (e) {
    dbg('에러 발생: ' + e.message);
    dbg(e.stack || '');
  }
}

// ── 손가락 펴짐 판정 ──
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y, (a.z||0) - (b.z||0));
}

function fingerExtended(lm, tipIdx, pipIdx, mcpIdx) {
  const tip = lm[tipIdx], pip = lm[pipIdx], mcp = lm[mcpIdx], wrist = lm[0];
  return dist(tip, wrist) > dist(pip, wrist) && dist(tip, wrist) > dist(mcp, wrist) * 1.05;
}

function classifyGesture(lm) {
  const thumbTip = lm[4], indexTip = lm[8];

  const indexExt = fingerExtended(lm, 8, 6, 5);
  const middleExt = fingerExtended(lm, 12, 10, 9);
  const ringExt = fingerExtended(lm, 16, 14, 13);
  const pinkyExt = fingerExtended(lm, 20, 18, 17);

  const thumbIndexDist = dist(thumbTip, indexTip);
  const otherExtCount = [middleExt, ringExt, pinkyExt].filter(Boolean).length;

  // 오케이: 엄지+검지 닿고, 중지/약지/소지 중 2개 이상 펴짐 (하이파이브보다 먼저 체크!)
  if (thumbIndexDist < 0.1 && otherExtCount >= 2) {
    return 'ok';
  }

  // 하이파이브: 4손가락 다 펴지고, 엄지-검지가 멀리 떨어져 있음(오케이와 명확히 구분)
  if (indexExt && middleExt && ringExt && pinkyExt && thumbIndexDist > 0.12) {
    return 'highfive';
  }

  // 손가락 하트 vs 엄지척 구분
  // 엄지척: 검지 끝(8)이 검지 두번째 관절(6)보다 손바닥 쪽에 있음 (검지가 완전히 말림)
  // 손가락 하트: 검지 끝이 엄지 끝에 정확히 닿아있어 거리가 매우 가까움
  const indexCurledIn = dist(indexTip, lm[5]) < dist(lm[6], lm[5]) * 1.1; // 검지가 접혀서 손바닥쪽 관절 근처에 있음

  if (thumbIndexDist < 0.15 && otherExtCount === 0 && !indexCurledIn) {
    return 'heart';
  }

  // 브이: 검지+중지 펴짐, 약지+소지 접힘
  if (indexExt && middleExt && !ringExt && !pinkyExt) {
    return 'victory';
  }

  // 엄지척: 검지/중지/약지/소지 다 접힘, 엄지가 위로 향함
  if (!indexExt && !middleExt && !ringExt && !pinkyExt) {
    const thumbUp = thumbTip.y < lm[2].y - 0.02;
    if (thumbUp) return 'thumbsup';
  }

  return null;
}

// ── 메인 디텍션 루프 ──
function detectLoop() {
  if (!handLandmarker || !video.videoWidth) {
    requestAnimationFrame(detectLoop);
    return;
  }

  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);

  const now = performance.now();
  try {
    const result = handLandmarker.detectForVideo(video, now);

    let detected = null;
    let rawInfo = '손 인식 안됨';
    if (result.landmarks && result.landmarks.length > 0) {
      detected = classifyGesture(result.landmarks[0]);
      const lm = result.landmarks[0];
      const indexExt = fingerExtended(lm, 8, 6, 5);
      const middleExt = fingerExtended(lm, 12, 10, 9);
      const ringExt = fingerExtended(lm, 16, 14, 13);
      const pinkyExt = fingerExtended(lm, 20, 18, 17);
      const thumbIndexDist = dist(lm[4], lm[8]).toFixed(3);
      rawInfo = `idx:${indexExt?1:0} mid:${middleExt?1:0} ring:${ringExt?1:0} pink:${pinkyExt?1:0} thumbDist:${thumbIndexDist} => ${detected || '없음'}`;
    }
    updateDebugLine(rawInfo);

    if (detected && !messages[detected]) detected = null;
    handleDetection(detected, now);
  } catch (e) {
    updateDebugLine('detectForVideo 에러: ' + e.message);
  }

  requestAnimationFrame(detectLoop);
}

let lastDebugLine = '';
function updateDebugLine(text) {
  lastDebugLine = text;
}

let displayedGestureId = null; // 현재 메시지가 떠있는 제스처 id

function handleDetection(detected, now) {
  // 이미 메시지가 떠있는 상태라면: 같은 제스처가 유지되는 동안 계속 유지
  if (displayedGestureId) {
    if (detected === displayedGestureId) {
      armedSince = now; // 계속 유지중
      return;
    } else {
      // 손을 내렸거나 다른 제스처로 바뀜 → 메시지 종료
      endMessage();
      // 그대로 아래 로직으로 진행해서 새 제스처 판정 가능
    }
  }

  if (detected) {
    if (armedGesture !== detected) {
      armedGesture = detected;
      armedSince = now;
    }
    const held = now - armedSince;
    updateTrayUI(detected);

    const g = GESTURES.find(x => x.id === detected);
    if (held < HOLD_MS) {
      updatePill(`${g.emoji} 조금만 더 유지해주세요`);
    } else {
      // 발동! 메시지 표시 시작 (유지형)
      fireMessage(detected);
      displayedGestureId = detected;
      armedGesture = null;
    }
  } else {
    armedGesture = null;
    updateTrayUI(null);
    updatePill('손짓을 찾고 있어요');
  }
}

function updatePill(text) {
  const pill = document.getElementById('detectPill');
  if (pill.textContent.replace(/^.*?\)/, '') !== text) {
    pill.innerHTML = `<span class="dot"></span>${text}`;
  }
}

function updateTrayUI(activeId) {
  GESTURES.forEach(g => {
    const chip = document.getElementById('chip-' + g.id);
    if (!chip) return;
    chip.classList.toggle('armed', g.id === activeId);
  });
}

// ── 메시지 등장 애니메이션 ──
function fireMessage(id) {
  const g = GESTURES.find(x => x.id === id);
  const text = messages[id];
  const overlay = document.getElementById('messageOverlay');
  const msgEl = document.getElementById('messageText');
  const veil = document.getElementById('glowVeil');

  currentDisplayedMessage = { text, color: g.color };

  msgEl.textContent = text;
  msgEl.style.color = '#fff';
  msgEl.style.textShadow = `0 0 30px ${g.color}, 0 2px 12px rgba(0,0,0,0.5)`;

  veil.style.background = `radial-gradient(circle at 50% 50%, ${g.color}33, transparent 70%)`;

  // 파티클 스폰
  spawnParticles(g);

  // 애니메이션
  overlay.style.transition = 'none';
  overlay.style.opacity = '0';
  msgEl.style.transform = 'scale(0.7) translateY(10px)';
  msgEl.style.transition = 'none';
  veil.style.transition = 'none';
  veil.style.opacity = '0';

  requestAnimationFrame(() => {
    overlay.style.transition = 'opacity 0.4s ease-out';
    msgEl.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
    veil.style.transition = 'opacity 0.4s ease-out';
    overlay.style.opacity = '1';
    veil.style.opacity = '1';
    msgEl.style.transform = 'scale(1) translateY(0)';
  });

  // 제스처가 유지되는 동안 파티클을 주기적으로 재생
  if (sustainParticleInterval) clearInterval(sustainParticleInterval);
  sustainParticleInterval = setInterval(() => spawnParticles(g), 1400);
}

function endMessage() {
  const overlay = document.getElementById('messageOverlay');
  const veil = document.getElementById('glowVeil');
  overlay.style.transition = 'opacity 0.5s ease-in';
  veil.style.transition = 'opacity 0.5s ease-in';
  overlay.style.opacity = '0';
  veil.style.opacity = '0';
  currentDisplayedMessage = null;
  displayedGestureId = null;
  if (sustainParticleInterval) {
    clearInterval(sustainParticleInterval);
    sustainParticleInterval = null;
  }
}
let sustainParticleInterval = null;

function spawnParticles(g) {
  const container = document.getElementById('cameraScreen');
  const emojiSet = { heart: ['❤️','💕','✨'], victory: ['🎉','✨','🎊'], thumbsup: ['👍','⭐','✨'], ok: ['✨','💫','🌟'], highfive: ['✋','👋','✨'] };
  const set = emojiSet[g.id] || ['✨'];
  for (let i = 0; i < 14; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.textContent = set[Math.floor(Math.random() * set.length)];
      el.style.position = 'absolute';
      el.style.left = (40 + Math.random() * 20) + '%';
      el.style.bottom = '30%';
      el.style.fontSize = (1.2 + Math.random() * 1.2) + 'rem';
      el.style.zIndex = 22;
      el.style.pointerEvents = 'none';
      el.style.transition = 'transform 1.8s ease-out, opacity 1.8s ease-out';
      el.style.transform = 'translate(0,0) scale(1)';
      el.style.opacity = '1';
      container.appendChild(el);
      requestAnimationFrame(() => {
        const dx = (Math.random() - 0.5) * 220;
        const dy = -200 - Math.random() * 200;
        el.style.transform = `translate(${dx}px, ${dy}px) scale(0.4) rotate(${(Math.random()-0.5)*120}deg)`;
        el.style.opacity = '0';
      });
      setTimeout(() => el.remove(), 1900);
    }, i * 40);
  }
}

// ── 사진 촬영 ──
let currentDisplayedMessage = null; // {text, color} 현재 화면에 떠있는 메시지

document.getElementById('photoBtn').addEventListener('click', () => {
  takePhoto();
});

function takePhoto() {
  const flash = document.getElementById('photoFlash');
  flash.style.transition = 'none';
  flash.style.opacity = '0.85';
  requestAnimationFrame(() => {
    flash.style.transition = 'opacity 0.3s ease-out';
    flash.style.opacity = '0';
  });

  const W = video.videoWidth, H = video.videoHeight;
  if (!W || !H) return;

  const shot = document.createElement('canvas');
  shot.width = W; shot.height = H;
  const sctx = shot.getContext('2d');

  // 셀카 좌우반전 비디오 그대로 캡처 (화면에 보이는 대로)
  sctx.save();
  sctx.translate(W, 0);
  sctx.scale(-1, 1);
  sctx.drawImage(video, 0, 0, W, H);
  sctx.restore();

  // 현재 메시지가 떠있다면 합성
  if (currentDisplayedMessage) {
    const fontSize = Math.round(W * 0.085);
    sctx.font = `800 ${fontSize}px -apple-system, sans-serif`;
    sctx.textAlign = 'center';
    sctx.textBaseline = 'middle';
    sctx.fillStyle = '#fff';
    sctx.shadowColor = currentDisplayedMessage.color;
    sctx.shadowBlur = fontSize * 0.4;
    wrapText(sctx, currentDisplayedMessage.text, W/2, H*0.27, W*0.86, fontSize*1.25);
  }

  const dataUrl = shot.toDataURL('image/jpeg', 0.92);
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = `gesture-message-${Date.now()}.jpg`;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function wrapText(ctx, text, cx, cy, maxWidth, lineHeight) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  const startY = cy - (lines.length - 1) * lineHeight / 2;
  lines.forEach((l, i) => ctx.fillText(l, cx, startY + i * lineHeight));
}

// ── 뒤로가기 ──
document.getElementById('backBtn').addEventListener('click', () => {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('cameraScreen').style.display = 'none';
  document.getElementById('setupScreen').style.display = 'flex';
});
</script>
